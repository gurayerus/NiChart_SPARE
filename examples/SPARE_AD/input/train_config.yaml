# SPARE-AD Training Configuration
#
# Paths are relative to this config file's location.
# Run with:
#   NiChart_SPARE train -c examples/SPARE_AD/input/train_config.yaml

# --- I/O ---
input_csv: raw_data.csv       # raw CSV in the same folder as this config
output_folder: ../output      # experiment will be created inside here
model_tag: SPARE_AD
model_version: "1.0"

# --- Task ---
spare_type: AD                # AD → uses classification pipeline

# --- Inline prep (raw data is prepped automatically before training) ---
target_column: disease        # 0 = CN, 1 = AD
ignore_columns: Study,SITE    # columns to drop; Sex and Age are kept as features

# --- SVM ---
svm_kernel: linear            # linear_fast | linear | rbf | poly | sigmoid
hyperparameter_tuning: true   # GridSearchCV over C values
train_whole: true             # train final model on full dataset after CV
cv_fold: 5                    # 5-fold cross-validation (set to 0 to skip)
class_balancing: true         # class_weight='balanced' to handle imbalanced labels

# --- Misc ---
key_variable: MRID
verbose: 1
