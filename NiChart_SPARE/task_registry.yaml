# NiChart_SPARE Task Registry
#
# Maps short task names to model files, versions, and Hugging Face repos.
# Replace placeholder hf_repo values with actual repos once models are uploaded.
#
# Keys:
#   description     - Human-readable label
#   spare_type      - SPARE type code used internally (CL/RG/AD/BA/CVM/HT/SM/BMI)
#   default_version - Version selected when --version is omitted
#   versions        - Map of version key -> model file info
#     hf_repo       - Hugging Face repository (org/repo-name)
#     hf_revision   - Branch/tag in the HF repo (default: main)
#     filename      - Filename of the .joblib model file in the HF repo

AD:
  description: "SPARE-AD: Alzheimer's Disease atrophy pattern"
  spare_type: AD
  default_version: v3.0
  versions:
    v3.0:
      hf_repo: "cbica/NiChart-SPARE-AD-v3.0"
      hf_revision: "main"
      filename: "SPARE-AD-Harmonized-ISTAGING_3_0.joblib"
    v3.0-raw:
      hf_repo: "cbica/NiChart-SPARE-AD-RAW-v3.0"
      hf_revision: "main"
      filename: "SPARE-AD-RAW-ISTAGING_3_0.joblib"

